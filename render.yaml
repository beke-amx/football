services:
  - type: web
    name: football-backend
    env: node
    plan: free
    region: oregon
    repo: https://github.com/beke-amx/football
    branch: main
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: football-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: football-redis
          property: connectionString
      - key: JWT_SECRET
        value: your-jwt-secret-here
      - key: GOOGLE_CLIENT_ID
        value: your-google-client-id-here
      - key: GOOGLE_CLIENT_SECRET
        value: your-google-client-secret-here
      - key: STRIPE_SECRET_KEY
        value: your-stripe-secret-key-here
      - key: STRIPE_WEBHOOK_SECRET
        value: your-stripe-webhook-secret-here
      - key: CLOUDINARY_URL
        value: your-cloudinary-url-here
      - key: PORT
        value: 10000

  - type: static
    name: football-frontend
    plan: free
    repo: https://github.com/beke-amx/football
    branch: main
    rootDir: frontend
    buildCommand: npm install && npm run build
    envVars:
      - key: REACT_APP_API_URL
        value: https://football-backend.onrender.com
      - key: REACT_APP_GOOGLE_CLIENT_ID
        value: your-google-client-id-here

databases:
  - name: football-db
    plan: free
    region: oregon
